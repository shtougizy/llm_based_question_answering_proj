<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拍照搜题辅助学习系统</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f4f8; min-height: 100vh; }
.navbar {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(102,126,234,0.4);
}
.navbar h1 { color: #fff; font-size: 1.2rem; font-weight: 600; }
.nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; margin-left: 20px; font-size: 0.9rem; transition: color 0.2s; }
.nav-links a:hover { color: #fff; }
.container { max-width: 800px; margin: 32px auto; padding: 0 16px; }
.card { background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); margin-bottom: 20px; }
.card-title { font-size: 1rem; font-weight: 600; color: #374151; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.card-title::before { content: ''; width: 4px; height: 18px; background: #667eea; border-radius: 2px; }
.upload-area { border: 2px dashed #c4b5fd; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #faf5ff; }
.upload-area:hover, .upload-area.dragover { border-color: #7c3aed; background: #f3e8ff; }
.upload-icon { font-size: 3rem; margin-bottom: 12px; }
.upload-text { color: #6b7280; font-size: 0.9rem; }
.upload-hint { color: #a78bfa; font-size: 0.8rem; margin-top: 6px; }
#preview-img { max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 12px; display: none; }
.or-divider { text-align: center; color: #9ca3af; font-size: 0.85rem; margin: 16px 0; position: relative; }
.or-divider::before, .or-divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #e5e7eb; }
.or-divider::before { left: 0; } .or-divider::after { right: 0; }
textarea { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 12px; font-size: 0.9rem; resize: vertical; min-height: 80px; font-family: inherit; transition: border-color 0.2s; outline: none; }
textarea:focus { border-color: #667eea; }
.options-row { display: flex; align-items: center; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
.checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #6b7280; cursor: pointer; }
.btn { padding: 12px 32px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; box-shadow: 0 4px 12px rgba(102,126,234,0.35); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(102,126,234,0.45); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-outline { background: transparent; color: #667eea; border: 1.5px solid #667eea; }
.btn-outline:hover { background: #f3f4ff; }
.btn-danger { background: #fef2f2; color: #dc2626; border: 1.5px solid #fca5a5; }
.btn-danger:hover { background: #fee2e2; }
#result-section { display: none; }
.result-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.tag { padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 500; }
.tag-purple { background: #f3e8ff; color: #7c3aed; } .tag-green { background: #d1fae5; color: #059669; }
.tag-blue { background: #dbeafe; color: #1d4ed8; } .tag-orange { background: #ffedd5; color: #c2410c; }
.question-box { background: #f8fafc; border-left: 4px solid #667eea; border-radius: 4px; padding: 14px 16px; margin-bottom: 16px; font-size: 0.9rem; line-height: 1.7; color: #374151; }
.answer-box { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 10px; padding: 16px; font-size: 0.9rem; line-height: 1.8; color: #166534; white-space: pre-wrap; }
.matched-box { background: #eff6ff; border: 1.5px solid #93c5fd; border-radius: 10px; padding: 14px; font-size: 0.85rem; color: #1e40af; }
.matched-box .label { font-weight: 600; margin-bottom: 6px; }
.viz-container { margin-top: 16px; }
.viz-container iframe { width: 100%; height: 400px; border: 1.5px solid #e5e7eb; border-radius: 10px; }
.knowledge-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.knowledge-tag { padding: 3px 10px; background: #f3f4f6; color: #6b7280; border-radius: 12px; font-size: 0.78rem; }
.loading { display: none; text-align: center; padding: 40px; }
.spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #6b7280; font-size: 0.9rem; }
.action-bar { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.alert { padding: 12px 16px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; }
.alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }

/* 思考过程折叠 */
.thinking-wrap { margin-bottom: 14px; border-radius: 10px; overflow: hidden; border: 1px solid #fde68a; }
.thinking-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  background: #fefce8; cursor: pointer; user-select: none;
  font-size: 0.82rem; color: #92400e; font-weight: 500;
}
.thinking-header:hover { background: #fef9c3; }
.thinking-arrow { margin-left: auto; font-size: 0.75rem; transition: transform 0.2s; }
.thinking-arrow.open { transform: rotate(180deg); }
.thinking-body {
  display: none; background: #fffbeb; padding: 12px 14px;
  font-size: 0.8rem; color: #78350f; line-height: 1.75;
  white-space: pre-wrap; max-height: 280px; overflow-y: auto;
  border-top: 1px solid #fde68a;
}
.thinking-body.show { display: block; }
</style>
</head>
<body>

<nav class="navbar">
  <h1>📚 拍照搜题辅助学习系统</h1>
  <div class="nav-links">
    <a href="/">首页</a>
    <a href="/history">历史记录</a>
    <a href="/wrong-book">错题本</a>
  </div>
</nav>

<div class="container">
  <!-- 输入卡片 -->
  <div class="card">
    <div class="card-title">提交题目</div>
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📷</div>
      <div class="upload-text">点击或拖拽上传题目图片</div>
      <div class="upload-hint">支持 JPG / PNG / HEIC 等格式</div>
      <img id="preview-img" alt="预览">
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none">
    <div class="or-divider">或者手动输入题目</div>
    <textarea id="text-input" placeholder="请在此输入题目内容..."></textarea>
    <div class="options-row">
      <label class="checkbox-label">
        <input type="checkbox" id="need-viz"> 生成程序题可视化
      </label>
      <div style="flex:1"></div>
      <button class="btn btn-primary" id="submit-btn" onclick="submitQuestion()">🔍 搜题解答</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">正在识别题目...</div>
  </div>

  <!-- 错误提示 -->
  <div class="alert alert-error" id="error-alert" style="display:none"></div>

  <!-- 结果卡片 -->
  <div id="result-section">
    <div class="card">
      <div class="card-title">解题结果</div>
      <div class="result-meta" id="result-meta"></div>

      <div style="font-size:0.8rem;color:#9ca3af;margin-bottom:6px;">识别的题目</div>
      <div class="question-box" id="result-question"></div>

      <!-- 题库匹配 -->
      <div id="matched-section" style="margin-bottom:16px;display:none">
        <div style="font-size:0.8rem;color:#9ca3af;margin-bottom:6px;">题库匹配</div>
        <div class="matched-box" id="matched-content"></div>
      </div>

      <!-- 思考过程折叠块 -->
      <div class="thinking-wrap" id="thinking-wrap" style="display:none">
        <div class="thinking-header" onclick="toggleThinking()">
          <span>🧠 模型思考过程</span>
          <span style="color:#b45309;font-size:0.75rem">（点击展开查看）</span>
          <span class="thinking-arrow" id="thinking-arrow">▼</span>
        </div>
        <div class="thinking-body" id="thinking-body"></div>
      </div>

      <div style="font-size:0.8rem;color:#9ca3af;margin-bottom:6px;">AI 解析</div>
      <div class="answer-box" id="result-answer"></div>

      <!-- 知识点 -->
      <div id="knowledge-section" style="margin-top:14px;display:none">
        <div style="font-size:0.8rem;color:#9ca3af;margin-bottom:6px;">涉及知识点</div>
        <div class="knowledge-tags" id="knowledge-tags"></div>
      </div>

      <!-- 程序题可视化 -->
      <div class="viz-container" id="viz-section" style="display:none">
        <div style="font-size:0.8rem;color:#9ca3af;margin-bottom:8px;">程序可视化</div>
        <iframe id="viz-frame" sandbox="allow-scripts"></iframe>
      </div>

      <div class="action-bar">
        <button class="btn btn-danger" id="mark-wrong-btn" onclick="markWrong()">❌ 加入错题本</button>
        <button class="btn btn-outline" onclick="clearAll()">🔄 重新搜题</button>
      </div>
    </div>
  </div>
</div>

<script>
let currentRecordId = null;
let selectedFile = null;

// 文件拖拽
const uploadArea = document.getElementById('upload-area');
uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('dragover'); });
uploadArea.addEventListener('drop', function(e) {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  var file = e.dataTransfer.files[0];
  if (file) handleFileSelect(file);
});
document.getElementById('file-input').addEventListener('change', function(e) {
  if (e.target.files[0]) handleFileSelect(e.target.files[0]);
});

function handleFileSelect(file) {
  selectedFile = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('preview-img');
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function submitQuestion() {
  var textInput = document.getElementById('text-input').value.trim();
  var needViz = document.getElementById('need-viz').checked;

  if (!selectedFile && !textInput) {
    showError('请上传图片或输入题目内容');
    return;
  }

  hideError();
  showLoading('正在分析题目...');
  setSubmitDisabled(true);
  document.getElementById('result-section').style.display = 'none';

  try {
    var data;
    if (selectedFile) {
      document.getElementById('loading-text').textContent = '多模态模型识别中...';
      var formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('username', 'default');
      formData.append('need_visualization', needViz);
      var resp = await fetch('/api/search/image', { method: 'POST', body: formData });
      data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || '请求失败');
    } else {
      document.getElementById('loading-text').textContent = 'AI 解答中...';
      var resp2 = await fetch('/api/search/text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question_text: textInput, username: 'default', need_visualization: needViz })
      });
      data = await resp2.json();
      if (!resp2.ok) throw new Error(data.detail || '请求失败');
    }
    showResult(data);
  } catch(e) {
    showError('搜题失败：' + e.message);
  } finally {
    hideLoading();
    setSubmitDisabled(false);
  }
}

function showResult(data) {
  currentRecordId = data.record_id;

  // Meta tags
  var tags = '';
  if (data.matched_from_bank) {
    tags += '<span class="tag tag-green">✅ 题库命中 ' + (data.similarity * 100).toFixed(0) + '%</span>';
  } else {
    tags += '<span class="tag tag-blue">🤖 AI 推理解答</span>';
  }
  if (data.matched_question) {
    var mq = data.matched_question;
    if (mq.subject) tags += '<span class="tag tag-purple">' + mq.subject + '</span>';
    if (mq.ques_type) tags += '<span class="tag tag-orange">' + mq.ques_type + '</span>';
    if (mq.ques_difficulty) tags += '<span class="tag tag-blue">' + mq.ques_difficulty + '</span>';
  }
  document.getElementById('result-meta').innerHTML = tags;

  document.getElementById('result-question').textContent = data.question_text;
  document.getElementById('result-answer').textContent = data.llm_answer;

  // 思考过程
  var thinkingWrap = document.getElementById('thinking-wrap');
  var thinkingBody = document.getElementById('thinking-body');
  if (data.llm_thinking && data.llm_thinking.trim()) {
    thinkingBody.textContent = data.llm_thinking;
    thinkingWrap.style.display = 'block';
    // 默认折叠
    thinkingBody.classList.remove('show');
    document.getElementById('thinking-arrow').classList.remove('open');
  } else {
    thinkingWrap.style.display = 'none';
  }

  // 题库匹配
  var matchedSec = document.getElementById('matched-section');
  if (data.matched_question && data.matched_from_bank) {
    var mq2 = data.matched_question;
    var answers = Array.isArray(mq2.ques_answer) ? mq2.ques_answer.join('、') : (mq2.ques_answer || '-');
    document.getElementById('matched-content').innerHTML =
      '<div class="label">📖 题库原题</div>' +
      '<div>' + (mq2.ques_content || '') + '</div>' +
      '<div style="margin-top:8px;font-size:0.8rem;">标准答案：' + answers + '</div>';
    matchedSec.style.display = 'block';
  } else {
    matchedSec.style.display = 'none';
  }

  // 知识点：优先用返回的 knowledges，其次用题库的
  var knowledges = data.knowledges || (data.matched_question && data.matched_question.ques_knowledges) || [];
  var knSec = document.getElementById('knowledge-section');
  if (knowledges.length > 0) {
    var knHtml = '';
    for (var i = 0; i < knowledges.length; i++) {
      knHtml += '<span class="knowledge-tag">' + knowledges[i] + '</span>';
    }
    document.getElementById('knowledge-tags').innerHTML = knHtml;
    knSec.style.display = 'block';
  } else {
    knSec.style.display = 'none';
  }

  // 程序题可视化
  var vizSec = document.getElementById('viz-section');
  if (data.visualization_html) {
    document.getElementById('viz-frame').srcdoc = data.visualization_html;
    vizSec.style.display = 'block';
  } else {
    vizSec.style.display = 'none';
  }

  document.getElementById('result-section').style.display = 'block';
  document.getElementById('mark-wrong-btn').disabled = false;
  document.getElementById('mark-wrong-btn').textContent = '❌ 加入错题本';
}

function toggleThinking() {
  var body = document.getElementById('thinking-body');
  var arrow = document.getElementById('thinking-arrow');
  var isOpen = body.classList.contains('show');
  body.classList.toggle('show', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

async function markWrong() {
  if (!currentRecordId) return;
  var btn = document.getElementById('mark-wrong-btn');
  btn.disabled = true;
  btn.textContent = '✅ 已加入错题本';
  await fetch('/api/mark-wrong', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ record_id: currentRecordId, username: 'default' })
  });
}

function clearAll() {
  selectedFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('text-input').value = '';
  document.getElementById('result-section').style.display = 'none';
  hideError();
  currentRecordId = null;
}

function showLoading(text) {
  document.getElementById('loading-text').textContent = text || '处理中...';
  document.getElementById('loading').style.display = 'block';
}
function hideLoading() { document.getElementById('loading').style.display = 'none'; }
function showError(msg) {
  var el = document.getElementById('error-alert');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() { document.getElementById('error-alert').style.display = 'none'; }
function setSubmitDisabled(v) { document.getElementById('submit-btn').disabled = v; }
</script>
</body>
</html>
